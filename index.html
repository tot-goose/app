<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🦆 Тот ещё Гусь — Бронь</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🦆 Тот ещё Гусь</h1>
      <p>Гастрокафе • Москва, Валовая 26</p>
    </header>
    <form id="bookingForm">
      <div class="form-group"><label>Имя *</label><input type="text" id="name" required placeholder="Иван"></div>
      <div class="form-group"><label>Телефон *</label><input type="tel" id="phone" required placeholder="+7 (999) 000-00-00"></div>
      <div class="row">
        <div class="form-group"><label>Дата *</label><input type="date" id="date" required></div>
        <div class="form-group"><label>Время *</label><input type="time" id="time" required min="12:00" max="23:30"></div>
      </div>
      <div class="form-group"><label>Гости *</label>
        <select id="guests" required><option value="">Выберите</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6+">6+</option></select>
      </div>
      <div class="form-group parking-section">
        <label><input type="checkbox" id="needsParking"> 🅿️ Нужна парковка</label>
      </div>
      <div id="carDetails" class="car-details" style="display:none;">
        <div class="row">
          <div class="form-group"><label>Марка *</label><input type="text" id="carBrand" placeholder="BMW, Toyota..."></div>
          <div class="form-group"><label>Госномер *</label><input type="text" id="carPlate" placeholder="А123БВ777" maxlength="10"></div>
        </div>
      </div>
      <button type="submit" class="btn-primary">✅ Забронировать стол</button>
    </form>
  </div>
  <script src="script.js"></script>
</body>
</html>
